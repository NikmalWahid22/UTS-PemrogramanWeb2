<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --own: #4f46e5;
      --own-light: #6366f1;
      --other: #22222e;
      --text: #f0f0f5;
      --muted: #7070a0;
      --green: #22c55e;
      --red: #ef4444;
      --accent: #818cf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse at 20% 50%, #1e1b4b22 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, #312e8122 0%, transparent 60%);
    }

    .chat-wrapper {
      width: min(420px, 100vw);
      height: 100vh;
      max-height: 100vh;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    @media (min-height: 600px) and (min-width: 480px) {
      .chat-wrapper {
        height: min(680px, 96vh);
        border-radius: 24px;
        border: 1px solid var(--border);
        box-shadow: 0 40px 80px #00000060, 0 0 0 1px #ffffff06 inset;
      }
    }

    /* HEADER */
    .header {
      padding: 14px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--own), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }

    .header-info { flex: 1; min-width: 0; }
    .header-title { font-size: 14px; font-weight: 700; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green);
      flex-shrink: 0; transition: all 0.3s;
    }
    .status-dot.off { background: var(--red); box-shadow: 0 0 8px var(--red); }

    /* USERNAME BAR */
    .username-bar {
      padding: 8px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); flex-shrink: 0;
    }

    #username {
      background: none; border: none;
      border-bottom: 1px dashed var(--border);
      color: var(--accent); font-family: inherit;
      font-size: 13px; font-weight: 700; outline: none;
      width: 130px; padding-bottom: 1px;
    }

    /* MESSAGES */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 12px 14px;
      display: flex; flex-direction: column;
      gap: 5px; scroll-behavior: smooth; min-height: 0;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-system {
      text-align: center; font-size: 11px; color: var(--muted);
      padding: 3px 10px; background: var(--surface2);
      border-radius: 20px; align-self: center; border: 1px solid var(--border);
    }

    .date-divider {
      display: flex; align-items: center; gap: 8px;
      margin: 6px 0; color: var(--muted); font-size: 11px; flex-shrink: 0;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .msg-row {
      display: flex; flex-direction: column;
      max-width: 80%;
      animation: popIn 0.18s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(6px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    .msg-row.own   { align-self: flex-end;   align-items: flex-end; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; }

    .msg-sender {
      font-size: 11px; font-weight: 600; color: var(--muted);
      margin-bottom: 3px; padding: 0 4px;
    }

    .msg-bubble {
      padding: 9px 13px; border-radius: 16px;
      font-size: 14px; line-height: 1.5; word-break: break-word;
    }

    .msg-row.own .msg-bubble {
      background: linear-gradient(135deg, var(--own), var(--own-light));
      color: #fff; border-bottom-right-radius: 4px;
    }

    .msg-row.other .msg-bubble {
      background: var(--other); color: var(--text);
      border-bottom-left-radius: 4px; border: 1px solid var(--border);
    }

    .msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 4px; }

    /* INPUT */
    .input-area {
      padding: 10px 14px; background: var(--surface2);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    }

    #msgInput {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 13px;
      color: var(--text); font-family: inherit; font-size: 14px;
      outline: none; transition: border-color 0.2s; min-width: 0;
    }
    #msgInput:focus { border-color: var(--own); }
    #msgInput::placeholder { color: var(--muted); }

    .send-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--own), var(--own-light));
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.15s, opacity 0.15s; color: white;
    }
    .send-btn:hover  { transform: scale(1.06); }
    .send-btn:active { transform: scale(0.94); opacity: 0.8; }
    .send-btn svg { width: 17px; height: 17px; }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="header">
      <div class="avatar">💬</div>
      <div class="header-info">
        <div class="header-title">WebSocket Chat</div>
        <div class="header-sub" id="statusText">Menghubungkan...</div>
      </div>
      <div class="status-dot off" id="statusDot"></div>
    </div>

    <div class="username-bar">
      <span>Nama kamu:</span>
      <input id="username" value="Pengguna1" maxlength="20" spellcheck="false"/>
    </div>

    <div id="messages">
      <div class="date-divider">Hari ini</div>
    </div>

    <div class="input-area">
      <input id="msgInput" placeholder="Tulis pesan... (Enter kirim)" autocomplete="off"/>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const ws = new WebSocket('ws://localhost:8080');
    const messagesEl = document.getElementById('messages');
    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    ws.onopen = () => {
      dot.classList.remove('off');
      statusText.textContent = 'Terhubung';
    };

    ws.onclose = () => {
      dot.classList.add('off');
      statusText.textContent = 'Terputus';
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      const myName = document.getElementById('username').value.trim();

      if (data.type === 'system') {
        const el = document.createElement('div');
        el.className = 'msg-system';
        el.textContent = data.message;
        messagesEl.appendChild(el);
      } else {
        const isOwn = data.sender === myName;
        const time = new Date(data.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

        const row = document.createElement('div');
        row.className = `msg-row ${isOwn ? 'own' : 'other'}`;

        if (!isOwn) {
          const s = document.createElement('div');
          s.className = 'msg-sender';
          s.textContent = data.sender;
          row.appendChild(s);
        }

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = data.message;
        row.appendChild(bubble);

        const t = document.createElement('div');
        t.className = 'msg-time';
        t.textContent = time;
        row.appendChild(t);

        messagesEl.appendChild(row);
      }

      messagesEl.scrollTop = messagesEl.scrollHeight;
    };

    function sendMessage() {
      const username = document.getElementById('username').value.trim() || 'Anonim';
      const input = document.getElementById('msgInput');
      const msg = input.value.trim();
      if (!msg || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ username, message: msg }));
      input.value = '';
      input.focus();
    }

    document.getElementById('msgInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
